name: Build Catalogue
on:
  push:
    branches:
      - master
    paths:
      - 'catalogue/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-certification-project-catalogue:latest ./catalogue
      - name: Push
        run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-certification-project-catalogue:latest
